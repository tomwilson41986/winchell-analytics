name: Japan Prospects daily update

# The japanracefillies feed refreshes at 06:00 JST (21:00 UTC). We run shortly
# after — 06:30 JST / 21:30 UTC — fetch the latest data, and commit it. The
# commit triggers Netlify's connected-repo build, which rebuilds + deploys the
# Japan Broodmare Prospects section from the new data.
on:
  schedule:
    - cron: '30 21 * * *' # 06:30 JST daily
  workflow_dispatch: {}

# Don't let a long run overlap the next scheduled one.
concurrency:
  group: japan-prospects-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest Japan prospect data
        env:
          # Fine-grained PAT with read access to tomwilson41986/japanracefillies.
          JAPAN_DATA_TOKEN: ${{ secrets.JAPAN_DATA_TOKEN }}
        run: node scripts/fetch-japan-prospects.mjs

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/japan-prospects
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "data: update Japan broodmare prospects feed"
            git push
          fi
